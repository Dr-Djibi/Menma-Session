<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENMA | PAIRING</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="/" style="text-decoration: none;">
                <h1>MENMA-MD</h1>
            </a>
            <p>Initialisation du code de parainage</p>
        </header>

        <div class="main-content">
            <div id="pair-input-section">
                <input type="text" id="phone-number" placeholder="224XXXXXXXXX">
                <button id="get-code-btn" class="btn btn-primary">
                    GET CODE
                </button>
            </div>

            <div id="pair-display-section" style="display: none; text-align: center;">
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">Utiliser ce code sur votre
                    appareil :
                </p>
                <div id="pair-code" class="code-box">--------</div>

                <div style="margin-top: 30px;">
                    <i class="fas fa-circle-notch fa-spin" style="color: var(--gold);"></i>
                </div>
            </div>

            <a href="/" class="btn" style="margin-top: 30px;">
                <i class="fas fa-arrow-left"></i> RETOUR
            </a>
        </div>
    </div>

    <script>
        const getCodeBtn = document.getElementById('get-code-btn');
        const numberInput = document.getElementById('phone-number'); // Changed from 'number' to 'phone-number' to match HTML
        const loadingSection = document.getElementById('pair-display-section'); // Re-using this for loading state
        const inputSection = document.getElementById('pair-input-section');
        const pairDisplaySection = document.getElementById('pair-display-section');
        const pairCodeElement = document.getElementById('pair-code');
        const instruction = pairDisplaySection.querySelector('p');

        let pollingId = null;

        getCodeBtn.onclick = async () => {
            const num = numberInput.value.trim();
            if (!num) return;

            inputSection.style.display = 'none';
            loadingSection.style.display = 'block';
            instruction.textContent = 'Utiliser ce code sur votre appareil :'; // Reset instruction
            instruction.style.color = 'var(--text-dim)'; // Reset color
            pairCodeElement.textContent = '--------'; // Reset code display
            pairCodeElement.style.fontSize = ''; // Reset font size
            pairCodeElement.style.wordBreak = ''; // Reset word break

            try {
                const response = await fetch('/api/pair?number=' + num);
                const data = await response.json();

                loadingSection.style.display = 'none';
                pairDisplaySection.style.display = 'block';
                pairCodeElement.textContent = data.code;
                pollingId = data.id;

                checkPairingStatus();
            } catch (err) {
                loadingSection.style.display = 'none';
                inputSection.style.display = 'block';
                alert("Erreur lors de la demande du code.");
            }
        };

        async function checkPairingStatus() {
            if (!pollingId) return;
            try {
                const response = await fetch('/api/status/' + pollingId);
                const data = await response.json();

                if (data.status === 'success') {
                    pairCodeElement.textContent = data.session;
                    pairCodeElement.style.fontSize = '0.9rem';
                    pairCodeElement.style.wordBreak = 'break-all';
                    instruction.textContent = 'SESSION CONNECTÉE ! Voici votre ID :';
                    instruction.style.color = '#2ecc71';
                } else if (data.status === 'error') {
                    instruction.textContent = 'ERREUR DE SESSION';
                    instruction.style.color = '#e74c3c';
                } else {
                    setTimeout(checkPairingStatus, 4000);
                }
            } catch (err) {
                setTimeout(checkPairingStatus, 5000);
            }
        }
    </script>
</body>

</html>
