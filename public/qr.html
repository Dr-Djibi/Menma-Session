<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENMA | QR SCAN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-mesh"></div>
    <div id="particles" class="particles"></div>

    <div class="container">
        <header>
            <a href="/" style="text-decoration: none;">
                <h1>MENMA-MD</h1>
            </a>
            <p>Scan pour se connecter</p>
        </header>

        <div class="main-content">
            <!-- Section résultat (SESSION ID + copy) -->
            <div id="status-container" style="display: none; margin-bottom: 20px;">
                <p id="success-label" style="color: #2ecc71; font-weight: bold; margin-bottom: 15px; letter-spacing: 1px;">✅ CONNEXION RÉUSSIE !</p>
                <div class="code-box" id="result-id">
                    Génération en cours...
                </div>
                <button class="btn btn-primary" id="copy-btn">
                    <i class="fas fa-copy"></i> COPIER L'ID SESSION
                </button>
                <a href="/qr" class="btn" style="margin-top: 15px;">
                    <i class="fas fa-redo"></i> NOUVELLE SESSION
                </a>
            </div>

            <!-- Section QR code -->
            <div id="qr-section">
                <div class="qr-display" id="qr-container">
                    <img id="qr-image" src="" alt="QR" style="width: 250px; height: 250px; display: block;">
                    <div id="qr-loader" style="display: none; color: var(--accent); font-size: 2.5rem; margin: 30px auto;">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </div>
                </div>

                <p id="qr-instruction" style="font-size: 0.85rem; color: var(--accent); margin-top: 25px; font-weight: 700; letter-spacing: 2px;">
                    SCANNEZ LE QR CODE
                </p>

                <div style="display: flex; gap: 10px; margin-top: 30px; flex-wrap: wrap;">
                    <button id="retry-btn" class="btn btn-primary">
                        <i class="fas fa-redo"></i> RÉESSAYER
                    </button>
                    <a href="/" class="btn" id="cancel-btn">
                        <i class="fas fa-times"></i> ANNULER
                    </a>
                </div>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2026 // <a href="https://github.com/Dr-Djibi/Menma-MD" target="_blank">DR DJIBI</a></p>
        </footer>
    </div>

    <script>
        let sessionId = 'QR_' + Math.random().toString(36).substring(2, 12);
        const img = document.getElementById('qr-image');
        const statusContainer = document.getElementById('status-container');
        const resultId = document.getElementById('result-id');
        const instruction = document.getElementById('qr-instruction');
        const copyBtn = document.getElementById('copy-btn');
        const retryBtn = document.getElementById('retry-btn');
        const qrSection = document.getElementById('qr-section');
        const qrLoader = document.getElementById('qr-loader');
        let polling = true;

        function loadQR() {
            polling = true;
            img.style.display = 'block';
            qrLoader.style.display = 'none';
            instruction.textContent = 'SCANNEZ LE QR CODE';
            instruction.style.color = 'var(--accent)';
            img.src = '/api/qr?id=' + sessionId;
            checkStatus();
        }

        async function checkStatus() {
            if (!polling) return;
            try {
                const response = await fetch('/api/qr/status/' + sessionId);
                if (!response.ok) { setTimeout(checkStatus, 3000); return; }
                const data = await response.json();

                if (data.status === 'success') {
                    polling = false;
                    qrSection.style.display = 'none';
                    statusContainer.style.display = 'block';
                    resultId.textContent = data.session;
                } else if (data.status === 'error') {
                    polling = false;
                    instruction.textContent = 'ERREUR DE GÉNÉRATION.';
                    instruction.style.color = '#e74c3c';
                } else {
                    setTimeout(checkStatus, 4000);
                }
            } catch (err) {
                setTimeout(checkStatus, 5000);
            }
        }

        loadQR();

        retryBtn.onclick = () => {
            sessionId = 'QR_' + Math.random().toString(36).substring(2, 12);
            loadQR();
        };

        img.onerror = () => {
            img.style.display = 'none';
            qrLoader.style.display = 'block';
            instruction.textContent = 'CHARGEMENT...';
            setTimeout(() => {
                img.src = '/api/qr?id=' + sessionId + '&t=' + Date.now();
                img.style.display = 'block';
                qrLoader.style.display = 'none';
            }, 5000);
        };

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(resultId.textContent);
            copyBtn.innerHTML = '<i class="fas fa-check"></i> COPIÉ !';
            setTimeout(() => {
                copyBtn.innerHTML = '<i class="fas fa-copy"></i> COPIER L\'ID SESSION';
            }, 2000);
        };

        // Particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = particle.style.height = (Math.random() * 4 + 1) + 'px';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.animationDelay = Math.random() * 20 + 's';
            container.appendChild(particle);
        }
    </script>
</body>

</html>
