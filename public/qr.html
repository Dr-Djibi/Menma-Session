<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENMA | QR SCAN</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <a href="/" style="text-decoration: none;">
                <h1>MENMA-MD</h1>
            </a>
            <p>Scan pour se connecter</p>
        </header>

        <div class="main-content">
            <div id="status-container" style="display: none; margin-bottom: 20px;">
                <div class="code-box" id="result-id"
                    style="font-size: 0.9rem; word-break: break-all; padding: 15px; border: 1px solid var(--gold-primary);">
                    Génération en cours...
                </div>
                <button class="btn btn-primary" id="copy-btn" style="margin-top: 10px; width: 100%;">
                    <i class="fas fa-copy"></i> COPIER L'ID
                </button>
            </div>

            <div class="qr-display" id="qr-container">
                <img id="qr-image" src="" alt="QR" style="width: 250px; height: 250px; display: block;">
            </div>

            <p id="qr-instruction" style="font-size: 0.8rem; color: var(--gold); margin-top: 25px; font-weight: 600;">
                SCANNER LE QR CODE
            </p>

            <a href="/" class="btn" id="cancel-btn" style="margin-top: 30px;">
                <i class="fas fa-times"></i> ANNULER
            </a>
        </div>
    </div>
    <script>
        const sessionId = 'QR_' + Math.random().toString(36).substring(2, 12);
        const img = document.getElementById('qr-image');
        const qrContainer = document.getElementById('qr-container');
        const statusContainer = document.getElementById('status-container');
        const resultId = document.getElementById('result-id');
        const instruction = document.getElementById('qr-instruction');
        const cancelBtn = document.getElementById('cancel-btn');
        const copyBtn = document.getElementById('copy-btn');

        img.src = '/api/qr?id=' + sessionId;

        async function checkStatus() {
            try {
                const response = await fetch('/api/status/' + sessionId);
                const data = await response.json();

                if (data.status === 'success') {
                    qrContainer.style.display = 'none';
                    instruction.textContent = 'CONNEXION RÉUSSIE !';
                    instruction.style.color = '#2ecc71';
                    statusContainer.style.display = 'block';
                    resultId.textContent = data.session;
                    cancelBtn.innerHTML = '<i class="fas fa-check"></i> TERMINER';
                    cancelBtn.className = 'btn btn-primary';
                } else if (data.status === 'error') {
                    instruction.textContent = 'ERREUR DE SESSION';
                    instruction.style.color = '#e74c3c';
                } else {
                    setTimeout(checkStatus, 3000);
                }
            } catch (err) {
                setTimeout(checkStatus, 5000);
            }
        }

        checkStatus();

        copyBtn.onclick = () => {
            navigator.clipboard.writeText(resultId.textContent);
            copyBtn.innerHTML = '<i class="fas fa-check"></i> COPIÉ !';
            setTimeout(() => {
                copyBtn.innerHTML = '<i class="fas fa-copy"></i> COPIER L\'ID';
            }, 2000);
        };

        img.onerror = () => {
            setTimeout(() => { img.src = '/api/qr?id=' + sessionId + '&t=' + Date.now(); }, 5000);
        };
    </script>
</body>

</html>
