<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENMA | GÉNÉRATEUR ENV</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="bg-mesh"></div>
    <div id="particles" class="particles"></div>

    <div class="container" style="max-width: 600px;">
        <header>
            <h1>GÉNÉRATEUR .ENV</h1>
            <p>Configurer Menma-MD</p>
        </header>

        <div class="main-content" id="form-container">
            <div class="scrollable-form">
                <div class="form-group">
                    <label>ID de Session (SESSION_ID)</label>
                    <input type="text" id="env-session" placeholder="Menma_md_XXXX_SESSION_ID..." required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Num. Propriétaire (Sans +)</label>
                        <input type="text" id="env-owner" placeholder="Ex: 224XXXXXXXXX" required>
                    </div>
                    <div class="form-group">
                        <label>Nom du Propriétaire</label>
                        <input type="text" id="env-owner-name" value="Dr Djibi" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Nom du Bot</label>
                        <input type="text" id="env-botname" value="𝙼𝙴𝙽𝙼𝙰-𝙼𝙳">
                    </div>
                    <div class="form-group">
                        <label>Préfixe</label>
                        <input type="text" id="env-prefix" value=".">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Mode de fonctionnement</label>
                        <select id="env-mode">
                            <option value="private" selected>Private (Privé)</option>
                            <option value="public">Public</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Zone de Temps</label>
                        <input type="text" id="env-tz" value="Africa/Conakry">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Auto-Like Status</label>
                        <select id="env-autolike">
                            <option value="oui" selected>Oui</option>
                            <option value="non">Non</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Lecture Auto Status</label>
                        <select id="env-autoread">
                            <option value="non" selected>Non</option>
                            <option value="oui">Oui</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Emojis pour 'Like' (Séparés par virgule)</label>
                    <input type="text" id="env-emojis" value="💚,❤️,✨,🔥,🙌">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Pack de Stickers</label>
                        <input type="text" id="env-packname" value="Menma-MD">
                    </div>
                    <div class="form-group">
                        <label>Auteur des Stickers</label>
                        <input type="text" id="env-author" value="Dr-Djibi">
                    </div>
                </div>

                <div class="form-group">
                    <label>URL Base de Données (Optionnel | Koyeb PostgreSQL)</label>
                    <input type="text" id="env-db" placeholder="postgres://user:pass@host/db">
                </div>
            </div>

            <button class="btn btn-primary" onclick="generateEnv()">
                <i class="fas fa-magic"></i> <span>GÉNÉRER MON .ENV</span>
            </button>
            <a href="/" class="btn">
                <i class="fas fa-arrow-left"></i> <span>RETOUR</span>
            </a>
        </div>

        <div class="main-content" id="result-container" style="display: none;">
            <p style="text-align: center; margin-bottom: 12px; color: var(--text-dim);"><i class="fas fa-check-circle" style="color: var(--accent);"></i> Fichier généré avec succès !</p>
            <textarea id="output-box" readonly></textarea>
            
            <button class="btn btn-primary" onclick="copyEnv()">
                <i class="fas fa-copy"></i> <span id="copy-text">COPIER LE TEXTE</span>
            </button>
            
            <button class="btn" onclick="downloadEnv()">
                <i class="fas fa-download"></i> <span>TÉLÉCHARGER config.env</span>
            </button>

            <button class="btn" onclick="resetForm()" style="margin-top: 16px;">
                <i class="fas fa-redo"></i> <span>REFAIRE</span>
            </button>
        </div>

        <footer>
            <p>&copy; 2026 // <a href="https://github.com/Dr-Djibi/Menma-MD" target="_blank">DR DJIBI</a></p>
        </footer>
    </div>

    <script>
        // Simple Particle System
        const container = document.getElementById('particles');
        const particleCount = 15;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';

            const size = Math.random() * 3 + 1 + 'px';
            particle.style.width = size;
            particle.style.height = size;

            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';

            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';

            container.appendChild(particle);
        }

        // Logic
        function generateEnv() {
            const session = document.getElementById('env-session').value.trim();
            const owner = document.getElementById('env-owner').value.trim();
            
            if (!session || !owner) {
                alert("Erreur: Vous devez au moins remplir l'ID de Session et le Numéro du Propriétaire !");
                return;
            }

            const dbUrl = document.getElementById('env-db').value.trim();

            let envContent = `# MENMA-MD CONFIGURATION\n\n`;
            envContent += `SESSION_ID=${session}\n`;
            envContent += `NUMERO_OWNER=${owner}\n`;
            envContent += `NOM_OWNER=${document.getElementById('env-owner-name').value.trim()}\n`;
            envContent += `NOM_BOT=${document.getElementById('env-botname').value.trim()}\n`;
            envContent += `PREFIX=${document.getElementById('env-prefix').value.trim()}\n`;
            envContent += `MODE=${document.getElementById('env-mode').value}\n`;
            envContent += `ZONE_DE_TEMPS=${document.getElementById('env-tz').value.trim()}\n`;
            envContent += `LECTURE_AUTO_STATUS=${document.getElementById('env-autoread').value}\n`;
            envContent += `AUTO_LIKE_STATUS=${document.getElementById('env-autolike').value}\n`;
            envContent += `LIKE_STATUS_EMOJIS=${document.getElementById('env-emojis').value.trim()}\n`;
            envContent += `STICKER_PACKNAME=${document.getElementById('env-packname').value.trim()}\n`;
            envContent += `STICKER_AUTHOR=${document.getElementById('env-author').value.trim()}\n`;
            
            if (dbUrl) {
                envContent += `DATABASE_URL=${dbUrl}\n`;
            }

            document.getElementById('output-box').value = envContent;
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('result-container').style.display = 'block';
        }

        function copyEnv() {
            const copyText = document.getElementById("output-box");
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Mobile
            navigator.clipboard.writeText(copyText.value);

            const btnText = document.getElementById("copy-text");
            btnText.innerText = "COPIÉ !";
            setTimeout(() => { btnText.innerText = "COPIER LE TEXTE"; }, 2000);
        }

        function downloadEnv() {
            const content = document.getElementById("output-box").value;
            const blob = new Blob([content], { type: "text/plain" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "config.env";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }

        function resetForm() {
            document.getElementById('result-container').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
        }
    </script>
</body>

</html>
